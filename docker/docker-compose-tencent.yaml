services:
  # ── Gateway API ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      args:
        # 使用腾讯云内网加速镜像（针对腾讯云 CVM/Lighthouse 服务器）
        # 也可以手动指定为 mirrors.cloud.tencent.com (公网)
        - APT_MIRROR=mirrors.tencentyun.com
        - UV_INDEX_URL=https://mirrors.tencentyun.com/pypi/simple
        # 使用 pip 安装 uv 而不是拉取 ghcr.io 镜像（国内环境推荐）
        - UV_INSTALL_METHOD=pip
        # 保险起见，将 UV_IMAGE 指向已拉取的镜像，防止 Docker 引擎尝试连接 ghcr.io
        - UV_IMAGE=python:3.12-slim-bookworm
    container_name: deer-flow-gateway
    # 本地镜像名称
    image: deer-flow-gateway:latest
    ports:
      - "8001:8001"
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 4"
    volumes:
      - ../config.yaml:/app/backend/config.yaml:ro
      - ../extensions_config.json:/app/backend/extensions_config.json:ro
      - ../skills:/app/skills:ro
      - ./data:/app/backend/.deer-flow
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/backend/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
      - DEER_FLOW_CHANNELS_LANGGRAPH_URL=http://langgraph:2024
      - DEER_FLOW_CHANNELS_GATEWAY_URL=http://gateway:8001
      - DEER_FLOW_HOST_BASE_DIR=${PWD}/data
      - DEER_FLOW_HOST_SKILLS_PATH=${PWD}/../skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow
    restart: unless-stopped

  # ── LangGraph Server ───────────────────────────────────────────────────────
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      args:
        - APT_MIRROR=mirrors.tencentyun.com
        - UV_INDEX_URL=https://mirrors.tencentyun.com/pypi/simple
        - UV_INSTALL_METHOD=pip
        - UV_IMAGE=python:3.12-slim-bookworm
    container_name: deer-flow-langgraph
    # 本地镜像名称
    image: deer-flow-langgraph:latest
    ports:
      - "2024:2024"
    command: sh -c 'cd /app/backend && uv run langgraph dev --no-browser --no-reload --host 0.0.0.0 --port 2024 --n-jobs-per-worker 10'
    volumes:
      - ../config.yaml:/app/backend/config.yaml:ro
      - ../extensions_config.json:/app/backend/extensions_config.json:ro
      - ./data:/app/backend/.deer-flow
      - ../skills:/app/skills:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/backend/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/backend/extensions_config.json
      - DEER_FLOW_HOST_BASE_DIR=${PWD}/data
      - DEER_FLOW_HOST_SKILLS_PATH=${PWD}/../skills
      - DEER_FLOW_SANDBOX_HOST=host.docker.internal
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - deer-flow
    restart: unless-stopped

networks:
  deer-flow:
    driver: bridge
