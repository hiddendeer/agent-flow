# 智能家居系统云端部署配置
# DeerFlow Smart Home System - Cloud Deployment
#
# 使用方法:
#   docker-compose -f docker/docker-compose-smarthome.yaml up -d
#
# 服务包括:
#   - smart-home: DeerFlow 智能家居服务
#   - homeassistant: Home Assistant 平台
#   - mqtt-broker: MQTT 消息代理
#   - redis: 缓存和状态存储
#   - nginx: 反向代理

version: "3.8"

services:
  # ── DeerFlow 智能家居服务 ─────────────────────────────────────────
  smart-home:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
    container_name: deer-flow-smart-home
    command: sh -c "cd backend && uv sync && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --reload --reload-include='*.yaml .env' > /app/logs/gateway.log 2>&1"
    volumes:
      - ../backend/:/app/backend/
      - smart-home-venv:/app/backend/.venv
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json
      - ../skills:/app/skills
      - ../logs:/app/logs
      - ~/.cache/uv:/root/.cache/uv
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CHANNELS_LANGGRAPH_URL=${DEER_FLOW_CHANNELS_LANGGRAPH_URL:-http://langgraph:2024}
      - DEER_FLOW_CHANNELS_GATEWAY_URL=${DEER_FLOW_CHANNELS_GATEWAY_URL:-http://gateway:8001}
      - DEER_FLOW_HOST_BASE_DIR=${DEER_FLOW_ROOT}/backend/.deer-flow
      - DEER_FLOW_HOST_SKILLS_PATH=${DEER_FLOW_ROOT}/skills
      # Home Assistant 配置
      - HOMEASSISTANT_URL=${HOMEASSISTANT_URL:-http://homeassistant:8123}
      - HOMEASSISTANT_TOKEN=${HOMEASSISTANT_TOKEN:-}
      # MQTT 配置
      - MQTT_BROKER=${MQTT_BROKER:-mqtt}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - smart-home
    restart: unless-stopped
    expose:
      - "8001"
    ports:
      - "8001:8001"
    depends_on:
      - homeassistant
      - mqtt-broker
      - redis

  # ── DeerFlow LangGraph 服务 ────────────────────────────────────────────
  langgraph:
    build:
      context: ../
      dockerfile: backend/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        UV_IMAGE: ${UV_IMAGE:-ghcr.io/astral-sh/uv:0.7.20}
        UV_INDEX_URL: ${UV_INDEX_URL:-https://pypi.org/simple}
    container_name: deer-flow-langgraph-smart-home
    command: sh -c "cd backend && uv sync && uv run langgraph dev --no-browser --allow-blocking --host 0.0.0.0 --port 2024 --n-jobs-per-worker 10 > /app/logs/langgraph.log 2>&1"
    volumes:
      - ../backend/:/app/backend/
      - langgraph-venv:/app/backend/.venv
      - ../config.yaml:/app/config.yaml
      - ../extensions_config.json:/app/extensions_config.json
      - ../skills:/app/skills
      - ../logs:/app/logs
      - ~/.cache/uv:/root/.cache/uv
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_HOST_BASE_DIR=${DEER_FLOW_ROOT}/backend/.deer-flow
      - DEER_FLOW_HOST_SKILLS_PATH=${DEER_FLOW_ROOT}/skills
      # Home Assistant 配置
      - HOMEASSISTANT_URL=${HOMEASSISTANT_URL:-http://homeassistant:8123}
      - HOMEASSISTANT_TOKEN=${HOMEASSISTANT_TOKEN:-}
      # MQTT 配置
      - MQTT_BROKER=${MQTT_BROKER:-mqtt}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
    env_file:
      - ../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - smart-home
    restart: unless-stopped
    expose:
      - "2024"
    ports:
      - "2024:2024"

  # ── Home Assistant 服务 ─────────────────────────────────────────────────
  homeassistant:
    image: homeassistant/home-assistant:latest
    container_name: home-assistant
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./homeassistant/config:/config
      - ./homeassistant/data:/data
    environment:
      - TZ=${TIMEZONE:-Asia/Shanghai}
    networks:
      - smart-home
    restart: unless-stopped
    ports:
      - "8123:8123"
    privileged: true
    # 如果使用 USB 设备（如 Zigbee 适配器），需要以下配置
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0:rwm

  # ── MQTT Broker 服务 ───────────────────────────────────────────────────
  mqtt:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    volumes:
      - ./mqtt/config:/mosquitto/config
      - ./mqtt/data:/mosquitto/data
      - ./mqtt/logs:/mosquitto/logs
    ports:
      - "1883:1883"
      - "9001:9001"  # WebSocket 端口
    networks:
      - smart-home
    restart: unless-stopped

  # ── Redis 缓存服务 ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smart-home-redis
    command: redis-server --appendonly yes
    volumes:
      - ./redis/data:/data
    networks:
      - smart-home
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ── Nginx 反向代理 ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: smart-home-nginx
    ports:
      - "2026:2026"
      - "8123:8123"  # Home Assistant 端口
    volumes:
      - ./nginx/smarthome.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - smart-home
      - langgraph
      - homeassistant
    networks:
      - smart-home
    restart: unless-stopped

# ── 数据卷 ───────────────────────────────────────────────────────────────
volumes:
  smart-home-venv:
  langgraph-venv:

# ── 网络 ───────────────────────────────────────────────────────────────────
networks:
  smart-home:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
